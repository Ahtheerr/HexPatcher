; HexPatcher extremamente genérico games
; Como usar:
; Texto entre colchetes é a introdução/nome do patch
; Argumentos:
; [Different_Versions] - Define múltiplas versões a partir de uma verificação de bytes.
; "Offsets = 0xXXXXXX" (Se tiver mais de um Offset pra mesma coisa, fazer "0xXXXXXX, 0xXXXXXX")
; "Type = hex" ou "Type = string", auto-explicativo (Obrigatório)
; "Raw = true" (Deixar sem ele significa = false) - Você vai querer usar isso aqui o tempo todo, isso indica que o Offset em Offsets não é o RVA, e sim o RAW (O offset que aparece no HxD/010)
; "Pointer = true" - Isso eu deixei porque funciona pro P4G e pro P5R, mas não vi nenhum Pointer desse tipo no P3P.
; "Data = hex/string" Isso é o "replacement"

